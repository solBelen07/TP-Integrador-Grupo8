<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/style-contacto.css">
    <link rel="stylesheet" href="../css/layout/header-footer.css">
</head>

<body>
    <header>
      <h1>TicketExpress</h1>
      <ul class="header-ul">
          <li class="header-li"><a href="./home.html">Inicio</a></li>
          <li class="header-li"><a href="./vuelos.html">Vuelos</a></li>
          <li class="header-li"><a href="./ofertas.html">Ofertas</a></li>
          <li class="header-li"><a href="./contacto.html">Contacto</a></li>
      </ul>
      <div>
          <a href="./perfil.html"><img src="../img/usuario.png" alt="usuario"></a>
      </div>
    </header>
    <!-- MAIN -->
    <main class="contenedor-contacto">
        <section class="formulario-contacto">
            <h2>Contáctanos</h2>
            <p class="texto-contacto">
                Completá tu información
            </p>
            <form>
                <!-- NOMBRE Y APELLIDO -->
                <div class="fila-formulario">
                    <div class="campo">
                        <label for="nombre">Nombre</label>
                        <input 
                            type="text" 
                            id="nombre" 
                            placeholder="Por ejemplo, Juan"
                                required>
                    </div>
                    <div class="campo">
                        <label for="apellido">Apellido</label>
                        <input 
                            type="text" 
                            id="apellido" 
                            placeholder="Por ejemplo, Pérez"
                            required
                        >
                    </div>
                </div>
                <!-- EMAIL -->
                <div class="campo">
                    <label for="email">Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        placeholder="ejemplo@email.com"
                        required
                    >
                </div>

                <!-- TELEFONO -->
                <div class="fila-formulario">
                    <div class="campo">
                        <label for="codigo">Código</label>
                        <select id="codigo">
                            <option>+54</option>
                            <option>+1</option>
                            <option>+34</option>
                            <option>+55</option>
                        </select>
                    </div>
                    <div class="campo">
                        <label for="telefono">Teléfono</label>
                        <input 
                            type="number" 
                            id="telefono" 
                            placeholder="11-5555-5555"
                            required>
                    </div>
                </div>
                <!-- MENSAJE -->
                <div class="campo">
                    <label for="mensaje">
                        Mensaje
                    </label>
                    <textarea 
                        id="mensaje" 
                        placeholder="Escribí tu mensaje"
                        required
                    ></textarea>
                </div>
                <button type="submit">
                    Enviar
                </button>
            </form>
            <p class="texto-final">
                Gracias por contactarte con TicketExpress
            </p>
        </section>
    </main>
    <footer>    
        <section class="footer-nosotros">
            <h3>Nosotros</h3>
            <ul>
              <li><a href="./nosotros.html">Sobre TicketExpress</a></li>
              <li><a href="./preguntas-frecuentes.html">Preguntas</a></li>
            </ul>
        </section>
        <section class="section-copyright">
            <p>©2026 TicketExpress. Todos los derechos reservados</p>
        </section>
        <section>
            <h3>Redes Sociales</h3>
            <div class="footer-div-redes">
                <a href="https://x.com/UnlamOficial" target="_blank"><i class="fa-brands fa-square-twitter"></i></a>
                <a href="https://www.instagram.com/unlamoficial/?hl=es" target="_blank"><i class="fa-brands fa-square-instagram"></i></a>
                <a href="https://www.facebook.com/@UnlamOficial/?locale=es_LA" target="_blank"><i class="fa-brands fa-square-facebook"></i></a>
                <a href="https://www.linkedin.com/school/unlamoficial/posts/?feedView=all" target="_blank"><i class="fa-brands fa-linkedin"></i></a>
            </div>
        </section>
    </footer>
</body>
</html>
