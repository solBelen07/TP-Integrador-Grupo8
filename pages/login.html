<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="../css/style-contacto.css">
    <link rel="stylesheet" href="../css/style-inicio-sesion.css">
</head>

<body>



    <main class="main-login">

        <form class="estilo-form" action="../index.html" method="post">

            <h1> Inicio de Sesion </h1>

            <label for="email">E-mail</label>
            <input type="email" placeholder="Ingresa tu email" id="email" name="email" required>
            <!-- placeholder es para que el usuario sepa qué información debe ingresar -->
            <label for="contraseña">Contraseña</label>
            <input type="password" placeholder="Ingresa tu contraseña" id="contraseña" name="contraseña" required>
            <button type="submit">Iniciar Sesion</button>
            <button type="reset">Cancelar</button>

            <a class= "registrarse" href="registrarse.html">Registrarse </a>
        </form>
    </main>
    
     <footer>

            </ul>
        </section>

            </div>

</body>
